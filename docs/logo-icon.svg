<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#38bdf8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="url(#bgG)"/>

  <!-- Subtle grid dots (background texture) -->
  <circle cx="20" cy="20" r="1.2" fill="#38bdf8" opacity="0.15"/>
  <circle cx="40" cy="20" r="1.2" fill="#38bdf8" opacity="0.12"/>
  <circle cx="20" cy="40" r="1.2" fill="#6366f1" opacity="0.12"/>
  <circle cx="108" cy="108" r="1.2" fill="#38bdf8" opacity="0.12"/>
  <circle cx="108" cy="90"  r="1.2" fill="#6366f1" opacity="0.1"/>

  <!-- Water ripple -->
  <ellipse cx="64" cy="103" rx="38" ry="5" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity="0.2"/>
  <ellipse cx="64" cy="109" rx="28" ry="4" fill="none" stroke="#38bdf8" stroke-width="1"   opacity="0.12"/>

  <!-- Tail feathers -->
  <path d="M 26 84 Q 18 72 22 58 Q 32 66 34 80 Z" fill="#e2e8f0" opacity="0.65"/>
  <path d="M 22 82 Q 12 70 14 54 Q 26 62 28 78 Z" fill="#cbd5e1" opacity="0.55"/>

  <!-- Body -->
  <ellipse cx="60" cy="84" rx="30" ry="20" fill="url(#bodyG)" filter="url(#shadow2)"/>

  <!-- Wing sheen -->
  <path d="M 38 74 Q 55 61 78 68 Q 68 76 50 80 Z" fill="white" opacity="0.45"/>

  <!-- Neck — S-curve -->
  <path d="M 82 76 C 94 66, 100 48, 90 34 C 84 24, 72 20, 68 13"
        fill="none" stroke="url(#bodyG)" stroke-width="10" stroke-linecap="round"/>
  <!-- Accent stripe on neck -->
  <path d="M 82 76 C 94 66, 100 48, 90 34 C 84 24, 72 20, 68 13"
        fill="none" stroke="url(#accentG)" stroke-width="3"
        stroke-linecap="round" opacity="0.9" filter="url(#glow2)"/>

  <!-- Head -->
  <circle cx="66" cy="11" r="10" fill="url(#bodyG)" filter="url(#shadow2)"/>

  <!-- Beak -->
  <path d="M 74 9 L 90 7 L 85 13 Z" fill="#f59e0b"/>
  <path d="M 74 9 L 90 7 L 87 10 Z" fill="#d97706"/>

  <!-- Eye -->
  <circle cx="71" cy="8" r="2.5" fill="#0f172a"/>
  <circle cx="72" cy="7" r="0.9" fill="white" opacity="0.85"/>

  <!-- Agent nodes -->
  <circle cx="20" cy="68" r="4.5" fill="#38bdf8" opacity="0.75" filter="url(#glow2)"/>
  <circle cx="12" cy="80" r="3.5" fill="#6366f1" opacity="0.7"  filter="url(#glow2)"/>
  <circle cx="18" cy="90" r="3"   fill="#38bdf8" opacity="0.55"/>

  <!-- Node connector lines -->
  <line x1="20" y1="68" x2="12" y2="80" stroke="#38bdf8" stroke-width="1.2" opacity="0.35"/>
  <line x1="12" y1="80" x2="18" y2="90" stroke="#6366f1" stroke-width="1.2" opacity="0.3"/>
  <line x1="20" y1="68" x2="18" y2="90" stroke="#38bdf8" stroke-width="1"   opacity="0.2"/>

  <!-- "S" letterform hint at bottom right (optional subtle branding) -->
  <text x="96" y="118"
        font-family="'SF Pro Display', system-ui, sans-serif"
        font-size="13" font-weight="700" letter-spacing="1"
        fill="url(#accentG)" opacity="0.6">SW</text>
</svg>
