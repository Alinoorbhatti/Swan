<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Swan body gradient -->
    <linearGradient id="swanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>

    <!-- Accent gradient for wing/neck -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#38bdf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="400" height="140" rx="16" fill="url(#bgGrad)"/>

  <!-- ── Swan illustration ── -->

  <!-- Water ripple lines (subtle) -->
  <ellipse cx="88" cy="108" rx="48" ry="5" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <ellipse cx="88" cy="114" rx="36" ry="4" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>

  <!-- Tail feathers -->
  <path d="M 48 90 Q 38 78 42 65 Q 52 72 55 85 Z" fill="#e2e8f0" opacity="0.7"/>
  <path d="M 44 88 Q 32 76 34 60 Q 46 68 50 84 Z" fill="#cbd5e1" opacity="0.6"/>

  <!-- Body -->
  <ellipse cx="78" cy="88" rx="34" ry="22" fill="url(#swanGrad)" filter="url(#shadow)"/>

  <!-- Wing highlight -->
  <path d="M 55 78 Q 70 65 95 72 Q 85 80 68 84 Z" fill="white" opacity="0.5"/>

  <!-- Neck — elegant S-curve -->
  <path d="M 100 80 C 112 72, 118 55, 110 42 C 105 34, 95 30, 90 24"
        fill="none" stroke="url(#swanGrad)" stroke-width="11" stroke-linecap="round"/>

  <!-- Neck accent (colour stripe) -->
  <path d="M 100 80 C 112 72, 118 55, 110 42 C 105 34, 95 30, 90 24"
        fill="none" stroke="url(#accentGrad)" stroke-width="3.5"
        stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>

  <!-- Head -->
  <circle cx="88" cy="21" r="11" fill="url(#swanGrad)" filter="url(#shadow)"/>

  <!-- Beak -->
  <path d="M 97 19 L 113 17 L 108 22 Z" fill="#f59e0b"/>
  <path d="M 97 19 L 113 17 L 110 19.5 Z" fill="#d97706"/>

  <!-- Eye -->
  <circle cx="93" cy="18" r="2.8" fill="#0f172a"/>
  <circle cx="94" cy="17" r="1" fill="white" opacity="0.8"/>

  <!-- Agent nodes (representing swarm) -->
  <!-- Node cluster near tail / behind body -->
  <circle cx="40" cy="73" r="4.5" fill="#38bdf8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="30" cy="86" r="3.5" fill="#6366f1" opacity="0.65" filter="url(#glow)"/>
  <circle cx="36" cy="96" r="3"   fill="#38bdf8" opacity="0.5"/>

  <!-- Connecting lines between nodes -->
  <line x1="40" y1="73" x2="30" y2="86" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="86" x2="36" y2="96" stroke="#6366f1" stroke-width="1" opacity="0.25"/>
  <line x1="40" y1="73" x2="36" y2="96" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>

  <!-- ── Wordmark ── -->

  <!-- "swan" -->
  <text x="148" y="74"
        font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="52"
        font-weight="700"
        letter-spacing="-1"
        fill="white">swan</text>

  <!-- Tagline -->
  <text x="150" y="100"
        font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="2"
        fill="#94a3b8">AGENT ORCHESTRATION</text>

  <!-- Accent line under wordmark -->
  <line x1="150" y1="107" x2="338" y2="107"
        stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
</svg>
